---
services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cvwonder
      POSTGRES_PASSWORD: cvwonder
      POSTGRES_DB: cvwonder
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cvwonder"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Go Backend (air hot-reload) ────────────────────────────────────────────
  backend:
    image: golang:1.25-alpine
    working_dir: /app/backend
    command: ["sh", "-c", "go install github.com/air-verse/air@latest && air"]
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://cvwonder:cvwonder@postgres:5432/cvwonder?sslmode=disable"
      CVWONDER_BINARY_PATH: "/usr/local/bin/cvwonder"
      SESSIONS_BASE_DIR: "/data/sessions"
      THEMES_BUILTIN_DIR: "/app/themes"
      THEMES_RUNTIME_DIR: "/data/themes"
      SESSION_DURATION_DAYS: "30"
      ADMIN_USERNAME: "admin"
      ADMIN_PASSWORD_HASH: "$2a$12$replacethiswithyourrealhashxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
      ADMIN_TOKEN_SECRET: "change-me-to-a-random-secret-of-at-least-32-chars"
      APP_BASE_URL: "${APP_BASE_URL:-}"
      # FRONTEND_BASE_URL: "" # Defaults to APP_BASE_URL. Set explicitly for split-origin deployments (e.g. separate CDN/SPA host).
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-}"
      USER_TOKEN_SECRET: "${USER_TOKEN_SECRET:-change-me-to-a-random-secret-of-at-least-32-chars}"
    volumes:
      - ./backend:/app/backend
      - ./infra/themes:/app/themes:ro
      - sessions_data:/data/sessions
      - themes_data:/data/themes
      - go_cache:/root/go
    depends_on:
      postgres:
        condition: service_healthy

  # ── Vite Dev Frontend ──────────────────────────────────────────────────────
  frontend:
    image: node:22-alpine
    working_dir: /app/frontend
    command: ["sh", "-c", "corepack enable && pnpm install && pnpm dev --host"]
    ports:
      - "5173:5173"
    environment:
      VITE_API_BASE: "http://localhost:8080"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  sessions_data:
  themes_data:
  go_cache:
  frontend_node_modules:

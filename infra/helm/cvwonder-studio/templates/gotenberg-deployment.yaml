{{- if .Values.gotenberg.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cvwonder-studio.fullname" . }}-gotenberg
  namespace: {{ .Values.forceNamespace | default .Release.Namespace }}
  labels:
    {{- include "cvwonder-studio.labels" . | nindent 4 }}
    app.kubernetes.io/component: gotenberg
spec:
  replicas: {{ .Values.gotenberg.replicaCount }}
  selector:
    matchLabels:
      {{- include "cvwonder-studio.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: gotenberg
  template:
    metadata:
      labels:
        {{- include "cvwonder-studio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: gotenberg
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
      containers:
        - name: gotenberg
          image: {{ include "cvwonder-studio.gotenbergImage" . }}
          imagePullPolicy: {{ .Values.gotenberg.image.pullPolicy }}
          args:
            - gotenberg
            - --chromium-disable-javascript=true
            - --chromium-allow-list=file:///tmp/.*
          ports:
            - name: http
              containerPort: {{ int .Values.gotenberg.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.gotenberg.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
{{- end }}

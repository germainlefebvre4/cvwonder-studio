apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cvwonder-studio.fullname" . }}
  namespace: {{ .Values.forceNamespace | default .Release.Namespace }}
  labels:
    {{- include "cvwonder-studio.labels" . | nindent 4 }}
data:
  PORT: {{ .Values.config.port | quote }}
  SESSIONS_BASE_DIR: {{ .Values.config.sessionsBaseDir | quote }}
  THEMES_BUILTIN_DIR: {{ .Values.config.themesBuiltinDir | quote }}
  THEMES_RUNTIME_DIR: {{ .Values.config.themesRuntimeDir | quote }}
  CVWONDER_BINARY_PATH: {{ .Values.config.cvwonderBinaryPath | quote }}
  SESSION_DURATION_DAYS: {{ .Values.config.sessionDurationDays | quote }}
  {{- if .Values.config.appBaseUrl }}
  APP_BASE_URL: {{ .Values.config.appBaseUrl | quote }}
  {{- end }}
  {{- if .Values.config.frontendBaseUrl }}
  FRONTEND_BASE_URL: {{ .Values.config.frontendBaseUrl | quote }}
  {{- end }}

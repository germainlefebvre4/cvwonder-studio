{{- if and .Values.storage.sessions.enabled (not .Values.storage.sessions.existingClaim) -}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "cvwonder-studio.fullname" . }}-sessions
  namespace: {{ .Values.forceNamespace | default .Release.Namespace }}
  labels:
    {{- include "cvwonder-studio.labels" . | nindent 4 }}
    app.kubernetes.io/component: sessions
    {{- with .Values.storage.sessions.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.storage.sessions.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  accessModes:
    {{- toYaml .Values.storage.sessions.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.storage.sessions.size }}
  {{- if .Values.storage.sessions.storageClass }}
  {{- if eq "-" .Values.storage.sessions.storageClass }}
  storageClassName: ""
  {{- else }}
  storageClassName: {{ .Values.storage.sessions.storageClass | quote }}
  {{- end }}
  {{- end }}
{{- end }}

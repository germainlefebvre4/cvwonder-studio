{{- if .Values.migrations.enabled -}}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "cvwonder-studio.fullname" . }}-migrate
  namespace: {{ .Values.forceNamespace | default .Release.Namespace }}
  labels:
    {{- include "cvwonder-studio.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrations
  annotations:
    ## Helm hook: run before install and upgrade, clean up on success.
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: hook-succeeded
    {{- with .Values.migrations.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  backoffLimit: {{ .Values.migrations.backoffLimit }}
  {{- if .Values.migrations.activeDeadlineSeconds }}
  activeDeadlineSeconds: {{ .Values.migrations.activeDeadlineSeconds }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "cvwonder-studio.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrations
    spec:
      restartPolicy: Never
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "cvwonder-studio.serviceAccountName" . }}
      {{- with .Values.securityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      ## Init container: copy migration files from the app image to a shared emptyDir.
      initContainers:
        - name: copy-migrations
          image: {{ include "cvwonder-studio.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - sh
            - -c
            - cp -r /app/db/migrations/. /migrations/
          volumeMounts:
            - name: migrations
              mountPath: /migrations
          {{- with .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      containers:
        - name: migrate
          image: {{ .Values.migrations.image.repository }}:{{ .Values.migrations.image.tag }}
          imagePullPolicy: {{ .Values.migrations.image.pullPolicy }}
          args:
            - -path
            - /migrations
            - -database
            - $(DATABASE_URL)
            - up
          env:
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              value: {{ include "cvwonder-studio.postgresqlUrl" . | quote }}
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cvwonder-studio.secretName" . }}
                  key: database-url
            {{- end }}
          {{- with .Values.migrations.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      volumes:
        - name: migrations
          emptyDir: {}
{{- end }}

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cvwonder-sessions-pvc
spec:
  accessModes:
    - ReadWriteMany  # Requires an RWX-capable StorageClass (NFS, CephFS, EFS, Azure Files…)
  resources:
    requests:
      storage: 5Gi
  # storageClassName: nfs-client  # Set to your RWX StorageClass
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cvwonder-themes-pvc
spec:
  accessModes:
    - ReadWriteMany  # Requires an RWX-capable StorageClass (NFS, CephFS, EFS, Azure Files…)
  resources:
    requests:
      storage: 2Gi
  # storageClassName: nfs-client  # Set to your RWX StorageClass

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cvwonder-sessions-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # storageClassName: standard  # Override per cluster

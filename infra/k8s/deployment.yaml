apiVersion: apps/v1
kind: Deployment
metadata:
  name: cvwonder-studio
  labels:
    app: cvwonder-studio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cvwonder-studio
  template:
    metadata:
      labels:
        app: cvwonder-studio
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: studio
          image: ghcr.io/germainlefebvre4/cvwonder-studio:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: cvwonder-studio-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: cvwonder-studio-secrets
                  key: database-url
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # cvwonder writes temp files
            capabilities:
              drop:
                - ALL
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: sessions
              mountPath: /data/sessions
            - name: themes
              mountPath: /data/themes
      volumes:
        - name: sessions
          persistentVolumeClaim:
            claimName: cvwonder-sessions-pvc
        - name: themes
          persistentVolumeClaim:
            claimName: cvwonder-themes-pvc
